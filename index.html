<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL TES KECERMATAN - Persona Research</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --navy: #0b2340;
            --gold: #d4a017;
            --white: #ffffff;
            --gray: #f1f5f9;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
            overflow: hidden;
            background: var(--navy);
            color: var(--white);
        }

        /* Animated Background */
        .bg-animate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0b2340, #1a3a5f);
        }

        .circle {
            position: absolute;
            background: rgba(212, 160, 23, 0.1);
            border-radius: 50%;
            animation: move 25s infinite linear;
        }

        @keyframes move {
            from { transform: translateY(0) rotate(0deg); opacity: 1; }
            to { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .logo-placeholder {
            font-size: 50px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; letter-spacing: 1px; }
        p { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 30px; }

        .menu-grid {
            display: none; /* Hidden until login */
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .menu-item {
            background: var(--white);
            color: var(--navy);
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .menu-item:hover { transform: scale(1.03); background: var(--gold); color: white; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: none;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            font-size: 1rem;
        }

        .btn-login {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-login:hover { background: #b88a15; }

        .status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #ff7675;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-animate" id="bg"></div>

    <div class="container">
        <div class="login-card">
            <div class="logo-placeholder"><i class="fas fa-brain"></i></div>
            <h1>TES KECERMATAN</h1>
            <p>Huruf Hilang - Persona.Research.Id</p>

            <div id="loginForm">
                <input type="password" id="passInput" placeholder="Masukkan Password Akses">
                <button class="btn-login" onclick="checkAccess()">MASUK SISTEM</button>
                <div id="errorMsg" class="status-msg"></div>
            </div>

            <div id="menuArea" class="menu-grid">
                <a href="huruf_mudah_1.html" class="menu-item">
                    <span><i class="fas fa-feather-alt"></i> Level Mudah</span>
                    <i class="fas fa-chevron-right"></i>
                </a>
                <a href="huruf_adv_4.html" class="menu-item">
                    <span><i class="fas fa-bolt"></i> Level Advanced</span>
                    <i class="fas fa-chevron-right"></i>
                </a>
                <div style="font-size: 10px; color: #aaa; margin-top: 10px;" id="expiryInfo"></div>
            </div>
        </div>

        <footer>&copy; 2026 Persona Research & Consulting</footer>
    </div>

    <script>
        // Konfigurasi
        const SECRET_PASS = "Ba194512";
        const MAX_DEVICES = 3;
        const ACCESS_DAYS = 7;

        // Generate Background Circles
        const bg = document.getElementById('bg');
        for (let i = 0; i < 15; i++) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const size = Math.random() * 100 + 50 + 'px';
            circle.style.width = size;
            circle.style.height = size;
            circle.style.left = Math.random() * 100 + '%';
            circle.style.top = Math.random() * 100 + '%';
            circle.style.animationDelay = Math.random() * 20 + 's';
            bg.appendChild(circle);
        }

        function checkAccess() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('errorMsg');
            
            // 1. Cek Password
            if (input !== SECRET_PASS) {
                error.textContent = "Password Salah!";
                return;
            }

            // Simpan identitas perangkat sederhana
            let deviceId = localStorage.getItem('persona_device_id');
            if (!deviceId) {
                deviceId = 'dev_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('persona_device_id', deviceId);
            }

            // Simulasi Database Perangkat (Dalam aplikasi nyata ini pakai Database Online)
            // Karena ini statis GitHub, kita pakai data simulasi yang tersimpan di Cloud/Sheet jika ingin ketat.
            // Di sini kita gunakan logika validasi waktu.
            
            handleLogic();
        }

        function handleLogic() {
            const now = new Date().getTime();
            let startTime = localStorage.getItem('access_start_time');
            let loginCount = parseInt(localStorage.getItem('device_login_count') || "0");

            // Cek jika ini pendaftaran perangkat (simulasi perangkat ke-2)
            if (!localStorage.getItem('is_registered')) {
                loginCount++;
                localStorage.setItem('device_login_count', loginCount);
                localStorage.setItem('is_registered', 'true');
            }

            // Logika: Masa akses dihitung sejak perangkat ke-2 login
            if (loginCount >= 2 && !startTime) {
                startTime = now;
                localStorage.setItem('access_start_time', startTime);
            }

            // Cek Kadaluarsa
            if (startTime) {
                const expiryDate = parseInt(startTime) + (ACCESS_DAYS * 24 * 60 * 60 * 1000);
                if (now > expiryDate) {
                    alert("Masa akses 7 hari Anda telah habis.");
                    return;
                }
                const daysLeft = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
                document.getElementById('expiryInfo').textContent = "Sisa Masa Akses: " + daysLeft + " Hari";
            }

            // Tampilkan Menu
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('menuArea').style.display = 'grid';
        }
    </script>
</body>
</html>
